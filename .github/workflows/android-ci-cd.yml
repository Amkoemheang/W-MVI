name: Android CI/CD

on:
  pull_request:
    branches:
      - develop
      - main

  push:
    branches:
      - develop
      - main
      - "release/**"

jobs:
  build-check:
    name: Build + Lint + Test Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew lintSitDebug

      - name: Run Unit Test
        run: ./gradlew test

      - name: Build SIT Debug APK
        run: ./gradlew assembleSitDebug