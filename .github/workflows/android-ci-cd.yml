name: Android CI/CD + AI Review

on:
  pull_request:
    branches:
      - develop
      - main

  push:
    branches:
      - develop
      - main
      - "release/**"

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run AI Code Review
        uses: coderabbitai/ai-pr-reviewer@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-check:
    name: Build + Lint + Test Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew lintSitDebug

      - name: Run Unit Test
        run: ./gradlew test

      - name: Build SIT Debug APK
        run: ./gradlew assembleSitDebug

  deploy-sit-uat:
    name: Deploy SIT/UAT
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build SIT Release APK
        run: ./gradlew assembleSitRelease

      - name: Build UAT Release APK
        run: ./gradlew assembleUatRelease

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Production AAB
        run: ./gradlew bundleProdRelease