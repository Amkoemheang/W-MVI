name: Android CI/CD

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
      - "release/**"
jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant permission
        uses: chmod +x gradlew

      - name: run unit test
        uses: ./gradlew test

      - name: Build debug apk
        run: ./gradlew assembleDebug

  deploy-sit-uat:
    name: Deploy SIT/UAT
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant permission
        run: chmod +x gradlew

      - name : Build SIT APK
        run: ./gradlew assembleSitRelease

      - name: Build UAT APK
        run:  ./gradlew assembleUatRelease

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/main'


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build Production AAB
        run: ./gradlew bundleProdRelease




